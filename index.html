<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ripple Studio - Сайты, дизайн и Telegram-боты под задачу</title>
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/main.css">
    <link rel="stylesheet" href="./css/media.css">
    <link rel="icon" type="image/x-icon" href="./img/favicons/favicon.svg">
    <link rel="apple-touch-icon" sizes="180x180" href="./img/favicons/apple-favicon.png">
</head>
<body> 

    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-row">

                <!-- Logo -->
                <img src="./img/header-ico.jpg" alt="Картинка" class="header-img">

                <!-- Text -->
                <div class="header-desc">
                    <h1 class="header-title">
                        Ripple Studio
                    </h1>
                    <p class="header-text">
                        Сайты, дизайн и Telegram-боты <br>под задачу
                    </p>

                    <!-- Buttons -->
                    <div class="header-btns">
                        <a href="#portfolio" class="btn">
                            Портфолио 
                        </a>
                        <a href="#contacts" class="btn-outline">
                            Контакты
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <video class="header-video" autoplay muted loop>
            <source type="video/mp4" src="./video/bg-vid.mp4">
        </video>
    </header>

    <!-- Main content -->
    <main>

        <!-- Portfolio -->
        <section class="portfolio" id="portfolio">
            <div class="container">
                <h2 class="portfolio-title">
                    Портфолио
                </h2>
            </div>

            <!-- Projects -->
            <div class="projects">

                <!-- Project 1 -->
                <article class="project">
                    <a href="./web.html" class="">
                        <img src="./img/portfolio/project-01.png" srcset="./img/portfolio/project-01@2x.png 2x" alt="First Project" class="project-img">
                    </a>

                    <h3 class="project-title"><a href="./web.html">Сайт магазина мебели</a></h3>
                </article>

                <!-- Project 2 -->
                <article class="project">
                    <a href="./design.html" class="">
                        <img src="./img/portfolio/project-02.png" srcset="./img/portfolio/project-02@2x.png 2x" alt="Second Project" class="project-img">
                    </a>
                    <h3 class="project-title"><a href="./design.html">Сайт туристического агентства</a></h3>
                </article>

                <!-- Project 3 -->  
                <article class="project">
                    <a href="./dev.html" class="">
                        <img src="./img/portfolio/project-03.png" srcset="./img/portfolio/project-03@2x.png 2x" alt="Third Project" class="project-img">
                    </a>
                    <h3 class="project-title"><a href="./dev.html">Сайт жилого комплекса</a></h3>
                </article>
            </div>
        </section>

        <!-- Contacts -->
        <section class="contacts" id="contacts">
            <div class="container">
                <h2 class="contacts-title">
                    Контакты
                </h2>
                
                <!-- Links -->
                <div class="messengers">
                    <a href="https://t.me/kolagenl" target="_blank" class="messengers-link">
                        <img src="./img/svg/telegram.svg" alt="Telegram">
                        Написать в Telegram
                    </a>

                    <a href="https://wa.me/37377944946" target="_blank" class="messengers-link">
                        <img src="./img/svg/whatsapp.svg" alt="WhatsApp">
                        Отправить в WhatsApp
                    </a>

                    <a href="https://vk.com/michael_gidirim" target="_blank" class="messengers-link">
                        <img src="./img/svg/vk.svg" alt="Вконтакте">
                        Связаться во Вконтакте
                    </a>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-inner">
                <p class="footer-text-1">© Ripple Studio</p>
                <p class="footer-text-2">digital • design • dev</p>
                <p class="footer-text-3">Бендеры 2026</p>
            </div>
        </div>
    </footer>
</body>
</html>
